# Workflow to build example Docker images with TileDB-SOMA installed
name: TileDB-SOMA docker builds
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/python-dockers.yml
      - docker/**
jobs:
  docker:
    strategy:
      fail-fast: false
      matrix:
        os:
          - runs-on: ubuntu-24.04
            suffix: ''
          - runs-on: ubuntu-24.04-arm
            suffix: ' ARM'
        img:
          - name: Ubuntu 2.3.0
            file: ubuntu
            args: v=2.3.0
          - name: Debian 2.3.0 gcc12
            file: bookworm
            args: gcc=12 v=2.3.0
          - name: Debian 2.3.0 gcc13
            file: bookworm
            args: gcc=13 v=2.3.0
          - name: Langchain
            file: langchain
            args: v=2.3.0
          - name: Python 3.13 + uv
            file: python-uv
            args: python=3.13
    name: ${{ matrix.img.name }}${{ matrix.os.suffix }}
    runs-on: ${{ matrix.os.runs-on }}
    steps:
      - uses: actions/checkout@v6
      - name: docker build
        run: |
          args=()
          for arg in ${{ matrix.img.args }}; do
            args+=(--build-arg $arg)
          done
          cmd=(docker build -f ${{ matrix.img.file }}.dockerfile -t ${{ matrix.img.file }} "${args[@]}" .)
          echo "Running: ${cmd[*]}"
          "${cmd[@]}"
        working-directory: docker
      - run: docker run ${{ matrix.img.file }}
        working-directory: docker
